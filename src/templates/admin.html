<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUUS - Админ-панель</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        form {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 3px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <h1>Админ-панель TUUS</h1>

    <form id="productForm">
        <label for="name">Название товара:</label>
        <input type="text" id="name" name="name" required>

        <label for="price">Цена:</label>
        <input type="number" id="price" name="price" step="0.01" min="0" required>

        <label for="stock">Количество на складе:</label>
        <input type="number" id="stock" name="stock" min="0" required>

        <button type="submit">Добавить товар</button>
    </form>

    <div id="message"></div>

    <button id="getProductsBtn">Получить список товаров</button>

    <div id="productsList"></div>

    <script>
        document.getElementById('getProductsBtn').addEventListener('click', async function () {
            try {
                const response = await fetch('http://localhost:8000/api/v1/products');

                const data = await response.json();

                const productsList = document.getElementById('productsList');

                productsList.innerHTML = '';

                data.products.forEach(product => {
                    productsList.innerHTML += `
                <div>
                    <h3>${product.name}</h3>
                    <p>ID: ${product.id}</p>
                    <p>Цена: ${product.price}</p>
                </div>
                <hr>
            `;
                });

            } catch (error) {
                const productsList = document.getElementById('productsList');

                productsList.innerHTML = `
            <p>Ошибка загрузки товаров: ${error.message}</p>
        `;
            }
        });
        // Обработка отправки формы
        document.getElementById('productForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            // Получение данных из формы
            const formData = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value)
            };

            // Отправка данных на сервер
            try {
                const response = await fetch('http://localhost:8000/api/v1/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const messageDiv = document.getElementById('message');

                if (response.ok) {
                    const result = await response.json();
                    messageDiv.textContent = `Товар успешно создан! ID: ${result.id}`;
                    messageDiv.className = 'success';

                    // Очистка формы
                    document.getElementById('productForm').reset();
                } else {
                    const error = await response.json();
                    messageDiv.textContent = `Ошибка: ${error.detail || 'Неизвестная ошибка'}`;
                    messageDiv.className = 'error';
                }
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = `Ошибка подключения: ${error.message}`;
                messageDiv.className = 'error';
            }
        });
    </script>
</body>

</html>
